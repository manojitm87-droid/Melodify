<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodify · Music</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/iloveyoujustyou13-debug/melodify--music@main/Ff_Arpon_cover.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <style>
        /* ===== FULL STYLE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-base: #121212;
            --bg-elevated: #181818;
            --bg-highlight: #282828;
            --bg-card: #1e1e1e;
            --bg-card-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #6a6a6a;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --shadow: 0 8px 24px rgba(0,0,0,0.6);
            --radius: 8px;
            --radius-sm: 6px;
            --radius-full: 9999px;
            --transition: 0.2s cubic-bezier(0.3,0,0,1);
            --player-height: 72px;
            --header-height: 64px;
            --font: 'Inter', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg-base);
            color: var(--text-primary);
            padding-top: var(--header-height);
            padding-bottom: calc(var(--player-height) + 24px);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--bg-highlight); border-radius: var(--radius-full); }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-height);
            padding: 0 1.5rem;
            background: rgba(18,18,18,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-primary);
            text-decoration: none;
        }
        .header-brand img { height: 32px; border-radius: 4px; }
        .header-brand .brand-text {
            background: linear-gradient(135deg, var(--accent), #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .header-actions .btn {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: var(--radius-full);
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-outline:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }
        .btn-sm { padding: 0.25rem 0.7rem; font-size: 0.7rem; }

        /* CONTAINER */
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem 1.5rem; }

        /* SONG GRID */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 0.5rem;
        }
        .song-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 0.8rem;
            transition: var(--transition);
            cursor: pointer;
        }
        .song-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        .song-card .thumbnail {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-elevated);
        }
        .song-card .title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .song-card .artist {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .song-card .category-badge {
            display: inline-block;
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 0.1rem 0.6rem;
            border-radius: var(--radius-full);
            background: rgba(29,185,84,0.15);
            color: var(--accent);
            margin-top: 0.3rem;
        }
        .song-card .card-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.06);
        }
        .btn-icon.play-btn {
            background: var(--accent);
            color: #000;
        }
        .btn-icon.play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* PLAYER */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 900;
            height: var(--player-height);
            background: rgba(24,24,24,0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            padding: 0 1.2rem;
            gap: 0.8rem;
        }
        .player .player-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 0 0 180px;
            min-width: 130px;
        }
        .player .player-info .media-container {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-elevated);
            flex-shrink: 0;
        }
        .player .player-info .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player .player-info .meta .title {
            font-weight: 500;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .player .player-info .meta .artist {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player .player-controls {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .player .player-controls .btn-icon {
            width: 32px;
            height: 32px;
            font-size: 0.85rem;
        }
        .player .player-controls .btn-icon.play-pause {
            width: 40px;
            height: 40px;
            font-size: 1.1rem;
            background: var(--text-primary);
            color: #000;
        }
        .player .player-progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        .player .player-progress .time {
            font-size: 0.65rem;
            color: var(--text-muted);
            min-width: 30px;
        }
        .player .player-progress input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--text-muted);
            outline: none;
            cursor: pointer;
        }
        .player .player-progress input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
        }
        .player .player-volume {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex: 0 0 100px;
        }
        .player .player-volume input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: var(--text-muted);
            outline: none;
            cursor: pointer;
        }
        .player .player-volume input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-primary);
            cursor: pointer;
        }
        .player .player-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .player .player-actions .btn-icon {
            width: 28px;
            height: 28px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: calc(var(--header-height) + 0.8rem);
            right: 1rem;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-width: 340px;
            width: 100%;
        }
        .toast {
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-primary);
            font-size: 0.8rem;
            box-shadow: var(--shadow);
            animation: slideInRight 0.25s ease;
        }
        .toast.success { border-left: 3px solid var(--accent); }
        .toast.error { border-left: 3px solid #ef4444; }
        .toast.info { border-left: 3px solid #3b82f6; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 820px) {
            .header { padding: 0 0.6rem; }
            .song-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .player .player-info { flex: 0 0 100px; min-width: 70px; }
            .player .player-info .media-container { width: 34px; height: 34px; }
            .player .player-info .meta .title { font-size: 0.7rem; }
            .player .player-info .meta .artist { font-size: 0.6rem; }
            .player .player-volume { display: none; }
        }
        @media (max-width: 480px) {
            .song-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.6rem; }
            .song-card { padding: 0.4rem; }
            .song-card .title { font-size: 0.7rem; }
            .song-card .artist { font-size: 0.6rem; }
            .header-actions .btn { font-size: 0.6rem; padding: 0.2rem 0.5rem; }
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--bg-highlight);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state i { font-size: 2.5rem; color: var(--text-muted); margin-bottom: 0.8rem; }
        .empty-state h3 { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.3rem; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="header-brand">
            <img src="https://cdn.jsdelivr.net/gh/iloveyoujustyou13-debug/melodify--music@main/Ff_Arpon_cover.png" alt="Melodify" />
            <span class="brand-text">Melodify</span>
        </a>
        <div class="header-actions">
            <a href="user-dashboard.html" class="btn btn-outline btn-sm"><i class="fas fa-user"></i> Login</a>
            <a href="admin-dashboard.html" class="btn btn-outline btn-sm"><i class="fas fa-user-shield"></i> Admin</a>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container">
        <div id="songGridContainer">
            <div class="song-grid" id="songGrid"></div>
            <div id="loadingSpinner" class="spinner"></div>
            <div id="emptyState" class="empty-state hidden">
                <i class="fas fa-music"></i>
                <h3>No songs found</h3>
                <p>Check back later for new music.</p>
            </div>
        </div>
    </main>

    <!-- PLAYER -->
    <div class="player" id="player">
        <div class="player-info" id="playerInfoTrigger">
            <div class="media-container">
                <img id="playerThumb" src="https://placehold.co/100x100/181818/333?text=🎵" alt="Album art" />
            </div>
            <div class="meta">
                <div class="title" id="playerTitle">No song selected</div>
                <div class="artist" id="playerArtist">—</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="btn-icon" id="playerPrev"><i class="fas fa-step-backward"></i></button>
            <button class="btn-icon play-pause" id="playerPlayPause"><i class="fas fa-play"></i></button>
            <button class="btn-icon" id="playerNext"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="player-progress">
            <span class="time" id="playerCurrentTime">0:00</span>
            <input type="range" id="playerSeek" min="0" max="100" value="0" />
            <span class="time" id="playerDuration">0:00</span>
        </div>
        <div class="player-volume">
            <button class="btn-icon" id="playerVolumeToggle"><i class="fas fa-volume-up"></i></button>
            <input type="range" id="playerVolume" min="0" max="1" step="0.01" value="0.8" />
        </div>
        <div class="player-actions">
            <button class="btn-icon" id="playerDownloadBtn" title="Download"><i class="fas fa-download"></i></button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- AUDIO -->
    <audio id="audioElement" preload="metadata"></audio>

    <!-- ===== JAVASCRIPT ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth } from 'firebase/auth';
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyBYFY3eNn69NG54PsIvJkOwh2UMeTpJVdU",
            authDomain: "melodify-85954.firebaseapp.com",
            projectId: "melodify-85954",
            storageBucket: "melodify-85954.firebasestorage.app",
            messagingSenderId: "635746561853",
            appId: "1:635746561853:web:fcc711d983cc9332f89f54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===== STATE =====
        const state = {
            songs: [],
            currentSong: null,
            currentIndex: -1,
            isPlaying: false,
            audio: document.getElementById('audioElement'),
            $: (id) => document.getElementById(id)
        };
        const $ = state.$;
        const audio = state.audio;

        // ===== DOM REFS =====
        const songGrid = $('songGrid');
        const loadingSpinner = $('loadingSpinner');
        const emptyState = $('emptyState');
        const playerThumb = $('playerThumb');
        const playerTitle = $('playerTitle');
        const playerArtist = $('playerArtist');
        const playerPlayPause = $('playerPlayPause');
        const playerSeek = $('playerSeek');
        const playerCurrentTime = $('playerCurrentTime');
        const playerDuration = $('playerDuration');
        const playerVolume = $('playerVolume');
        const playerVolumeToggle = $('playerVolumeToggle');
        const playerDownloadBtn = $('playerDownloadBtn');
        const playerPrev = $('playerPrev');
        const playerNext = $('playerNext');

        // ==============================================================
        //  TOAST
        // ==============================================================
        function showToast(message, type = 'info') {
            const container = $('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = '0.25s ease';
                setTimeout(() => toast.remove(), 350);
            }, 3200);
        }

        // ==============================================================
        //  CDN HELPER
        // ==============================================================
        function convertToCdnUrl(url) {
            if (!url) return url;
            if (url.includes('cdn.jsdelivr.net/gh/')) return url;
            const rawMatch = url.match(/raw\.githubusercontent\.com\/([^\/]+)\/([^\/]+)\/([^\/]+)\/(.+)/);
            if (rawMatch) {
                const [, username, repo, branch, path] = rawMatch;
                return `https://cdn.jsdelivr.net/gh/${username}/${repo}@${branch}/${path}`;
            }
            return url;
        }

        // ==============================================================
        //  FORMAT TIME
        // ==============================================================
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ==============================================================
        //  PLAYBACK FUNCTIONS
        // ==============================================================
        function playSong(song) {
            if (!song || !song.audioUrl) { showToast('Song URL not available.', 'error'); return; }
            const cdnUrl = convertToCdnUrl(song.audioUrl);

            if (state.currentSong && state.currentSong.id === song.id) { togglePlayPause(); return; }

            state.currentSong = song;
            state.currentIndex = state.songs.findIndex(s => s.id === song.id);

            audio.src = cdnUrl;
            audio.load();
            audio.play().then(() => {
                state.isPlaying = true;
                updatePlayerUI();
                renderSongs();
            }).catch((err) => {
                console.error('Playback error:', err);
                showToast('Unable to play. Check audio URL.', 'error');
            });
        }

        function togglePlayPause() {
            if (!state.currentSong) return;
            if (audio.paused) {
                audio.play().then(() => {
                    state.isPlaying = true;
                    updatePlayerUI();
                    renderSongs();
                }).catch(() => {});
            } else {
                audio.pause();
                state.isPlaying = false;
                updatePlayerUI();
                renderSongs();
            }
        }

        function playPrev() {
            if (state.songs.length === 0) return;
            const idx = state.currentIndex > 0 ? state.currentIndex - 1 : state.songs.length - 1;
            const song = state.songs[idx];
            if (song) playSong(song);
        }

        function playNext() {
            if (state.songs.length === 0) return;
            const idx = (state.currentIndex + 1) % state.songs.length;
            const song = state.songs[idx];
            if (song) playSong(song);
        }

        function resetPlayer() {
            audio.pause();
            audio.src = '';
            state.isPlaying = false;
            state.currentSong = null;
            state.currentIndex = -1;
            playerTitle.textContent = 'No song selected';
            playerArtist.textContent = '—';
            playerThumb.src = 'https://placehold.co/100x100/181818/333?text=🎵';
            playerPlayPause.innerHTML = '<i class="fas fa-play"></i>';
            playerSeek.value = 0;
            playerCurrentTime.textContent = '0:00';
            playerDuration.textContent = '0:00';
            renderSongs();
        }

        function updatePlayerUI() {
            if (!state.currentSong) { resetPlayer(); return; }
            const s = state.currentSong;
            playerTitle.textContent = s.title;
            playerArtist.textContent = s.artist;
            const thumbCdn = convertToCdnUrl(s.thumbnailUrl);
            playerThumb.src = thumbCdn;
            playerThumb.onerror = function() { this.src = 'https://placehold.co/100x100/181818/333?text=🎵'; };
            playerPlayPause.innerHTML = state.isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            if (audio.duration) playerDuration.textContent = formatTime(audio.duration);
        }

        // ==============================================================
        //  AUDIO EVENTS
        // ==============================================================
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                playerSeek.value = progress;
                playerCurrentTime.textContent = formatTime(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            playerDuration.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', () => {
            state.isPlaying = false;
            updatePlayerUI();
            renderSongs();
            playNext();
        });
        audio.addEventListener('error', () => {
            showToast('Audio playback error.', 'error');
            state.isPlaying = false;
            updatePlayerUI();
        });

        playerSeek.addEventListener('input', () => {
            if (audio.duration) {
                const time = (parseFloat(playerSeek.value) / 100) * audio.duration;
                audio.currentTime = time;
                playerCurrentTime.textContent = formatTime(time);
            }
        });

        playerVolume.addEventListener('input', () => { audio.volume = parseFloat(playerVolume.value); });
        playerVolumeToggle.addEventListener('click', () => {
            if (audio.volume > 0) { audio.volume = 0; playerVolume.value = 0; }
            else { audio.volume = 0.8; playerVolume.value = 0.8; }
        });

        playerPlayPause.addEventListener('click', togglePlayPause);
        playerPrev.addEventListener('click', playPrev);
        playerNext.addEventListener('click', playNext);

        // ==============================================================
        //  DOWNLOAD (login required)
        // ==============================================================
        async function handleDownload(song) {
            // 🔒 লগইন চেক (এই পেজে ডাউনলোড ব্লক)
            showToast('Please login to download songs.', 'info');
            return;
        }

        playerDownloadBtn.addEventListener('click', () => {
            if (state.currentSong) handleDownload(state.currentSong);
            else showToast('No song selected.', 'info');
        });

        // ==============================================================
        //  RENDER SONGS
        // ==============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderSongs() {
            if (state.songs.length === 0) {
                songGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            loadingSpinner.classList.add('hidden');

            songGrid.innerHTML = state.songs.map((song) => {
                const isCurrent = state.currentSong && state.currentSong.id === song.id;
                const isPlaying = isCurrent && state.isPlaying;
                const thumbCdn = convertToCdnUrl(song.thumbnailUrl);
                return `
                    <div class="song-card" data-id="${song.id}">
                        <img class="thumbnail" src="${thumbCdn}" alt="${escapeHtml(song.title)}" loading="lazy"
                            onerror="this.src='https://placehold.co/300x300/181818/333?text=🎵';" />
                        <div class="title">${escapeHtml(song.title)}</div>
                        <div class="artist">${escapeHtml(song.artist)}</div>
                        <span class="category-badge">${escapeHtml(song.category || 'Uncategorized')}</span>
                        <div class="card-actions">
                            <button class="btn-icon play-btn" data-action="play" data-id="${song.id}">
                                <i class="fas ${isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                            </button>
                            <button class="btn-icon" data-action="download" data-id="${song.id}">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            songGrid.querySelectorAll('[data-action="play"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const song = state.songs.find(s => s.id === btn.dataset.id);
                    if (song) playSong(song);
                });
            });

            songGrid.querySelectorAll('[data-action="download"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const song = state.songs.find(s => s.id === btn.dataset.id);
                    if (song) handleDownload(song);
                });
            });

            songGrid.querySelectorAll('.song-card').forEach(card => {
                card.addEventListener('click', () => {
                    const song = state.songs.find(s => s.id === card.dataset.id);
                    if (song) playSong(song);
                });
            });
        }

        // ==============================================================
        //  FIRESTORE LISTEN
        // ==============================================================
        let unsubscribeSongs = null;

        function listenSongs() {
            if (unsubscribeSongs) unsubscribeSongs();
            const q = query(collection(db, 'songs'), orderBy('uploadDate', 'desc'));
            unsubscribeSongs = onSnapshot(q, (snapshot) => {
                const songs = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    songs.push({
                        id: doc.id,
                        ...data,
                        likes: data.likes || 0,
                        views: data.views || 0,
                        lyrics: data.lyrics || '',
                    });
                });
                state.songs = songs;
                renderSongs();
                if (state.currentSong && !songs.find(s => s.id === state.currentSong.id)) {
                    resetPlayer();
                }
            }, (err) => {
                console.error('Firestore listen error:', err);
                showToast('Error loading songs.', 'error');
                loadingSpinner.classList.add('hidden');
            });
        }

        // ==============================================================
        //  INIT
        // ==============================================================
        audio.volume = parseFloat(playerVolume.value);
        listenSongs();

        console.log('🎵 Melodify · Public Front Page');
        console.log('🔒 Download requires login — redirecting to user-dashboard.html');
    </script>
</body>
</html>
